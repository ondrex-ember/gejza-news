name: Auto-Update Feed Data

on:
  schedule:
    - cron: '*/15 * * * *' # Běží každých 15 minut
  workflow_dispatch: # Povolí manuální spuštění tlačítkem v GitHubu

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v3

      - name: Setup Node.js (v18 pro nativní fetch)
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Spuštění kompilátoru
        env:
          GAS_URL: ${{ secrets.GAS_URL }}
        run: node build.js

      - name: Commit a Push hotových dat
        run: |
          git config --global user.name "Data Bot"
          git config --global user.email "bot@tvuj-projekt.cz"
          git add data.json
          # Commit projde jen pokud se data reálně změnila
          git commit -m "update: stažena nová data feedů [skip ci]" || exit 0
          git push
